<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>
  <!-- Background with subtle gradient -->
  <rect width="32" height="32" rx="8" fill="url(#grad)"/>
  <!-- Kanban columns abstraction -->
  <g fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left vertical bar -->
    <line x1="10" y1="6" x2="10" y2="26"/>
    <!-- Right angled stroke forming K -->
    <line x1="10" y1="16" x2="22" y2="6"/>
    <line x1="10" y1="16" x2="22" y2="26"/>
  </g>
  <!-- Small accent dots representing kanban cards -->
  <circle cx="24" cy="8" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="24" cy="16" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="24" cy="24" r="1.5" fill="white" opacity="0.5"/>
</svg>
