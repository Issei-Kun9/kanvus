<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1625;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2640;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a29bfe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(108,92,231,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Glow orbs -->
  <circle cx="200" cy="150" r="200" fill="rgba(108,92,231,0.12)"/>
  <circle cx="1000" cy="500" r="250" fill="rgba(253,203,110,0.06)"/>
  
  <!-- Card preview - top right -->
  <rect x="720" y="120" width="380" height="60" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(108,92,231,0.2)" stroke-width="1"/>
  <circle cx="756" cy="150" r="14" fill="#6c5ce7"/>
  <rect x="780" y="140" width="180" height="10" rx="5" fill="rgba(255,255,255,0.3)"/>
  <rect x="780" y="156" width="100" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  
  <rect x="720" y="200" width="380" height="60" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(0,184,148,0.2)" stroke-width="1"/>
  <circle cx="756" cy="230" r="14" fill="#00b894"/>
  <rect x="780" y="220" width="200" height="10" rx="5" fill="rgba(255,255,255,0.3)"/>
  <rect x="780" y="236" width="120" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  
  <rect x="720" y="280" width="380" height="60" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(253,203,110,0.2)" stroke-width="1"/>
  <circle cx="756" cy="310" r="14" fill="#fdcb6e"/>
  <rect x="780" y="300" width="160" height="10" rx="5" fill="rgba(255,255,255,0.3)"/>
  <rect x="780" y="316" width="90" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Status badges -->
  <rect x="720" y="380" width="80" height="28" rx="14" fill="rgba(108,92,231,0.2)"/>
  <text x="760" y="399" font-family="system-ui, sans-serif" font-size="12" fill="#a29bfe" text-anchor="middle">Backlog</text>
  
  <rect x="810" y="380" width="70" height="28" rx="14" fill="rgba(253,203,110,0.2)"/>
  <text x="845" y="399" font-family="system-ui, sans-serif" font-size="12" fill="#fdcb6e" text-anchor="middle">To Do</text>
  
  <rect x="890" y="380" width="100" height="28" rx="14" fill="rgba(0,184,148,0.2)"/>
  <text x="940" y="399" font-family="system-ui, sans-serif" font-size="12" fill="#55efc4" text-anchor="middle">In Progress</text>
  
  <rect x="720" y="420" width="90" height="28" rx="14" fill="rgba(162,155,254,0.2)"/>
  <text x="765" y="439" font-family="system-ui, sans-serif" font-size="12" fill="#a29bfe" text-anchor="middle">In Review</text>
  
  <rect x="820" y="420" width="60" height="28" rx="14" fill="rgba(0,184,148,0.3)"/>
  <text x="850" y="439" font-family="system-ui, sans-serif" font-size="12" fill="#55efc4" text-anchor="middle">Done</text>
  
  <!-- Logo -->
  <rect x="80" y="180" width="60" height="60" rx="16" fill="url(#accent)"/>
  <text x="110" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="white" text-anchor="middle">K</text>
  
  <!-- Title -->
  <text x="160" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-2">Kanvus</text>
  
  <!-- Subtitle -->
  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="rgba(255,255,255,0.6)">Project Management with Kanban Boards</text>
  
  <!-- Tech stack pills -->
  <rect x="80" y="330" width="110" height="32" rx="16" fill="rgba(108,92,231,0.15)" stroke="rgba(108,92,231,0.3)" stroke-width="1"/>
  <text x="135" y="351" font-family="system-ui, sans-serif" font-size="13" fill="#a29bfe" text-anchor="middle">Next.js 16</text>
  
  <rect x="200" y="330" width="110" height="32" rx="16" fill="rgba(0,184,148,0.15)" stroke="rgba(0,184,148,0.3)" stroke-width="1"/>
  <text x="255" y="351" font-family="system-ui, sans-serif" font-size="13" fill="#55efc4" text-anchor="middle">TypeScript</text>
  
  <rect x="320" y="330" width="120" height="32" rx="16" fill="rgba(253,203,110,0.15)" stroke="rgba(253,203,110,0.3)" stroke-width="1"/>
  <text x="380" y="351" font-family="system-ui, sans-serif" font-size="13" fill="#fdcb6e" text-anchor="middle">PostgreSQL</text>
  
  <rect x="450" y="330" width="100" height="32" rx="16" fill="rgba(162,155,254,0.15)" stroke="rgba(162,155,254,0.3)" stroke-width="1"/>
  <text x="500" y="351" font-family="system-ui, sans-serif" font-size="13" fill="#a29bfe" text-anchor="middle">Stripe</text>
  
  <rect x="560" y="330" width="80" height="32" rx="16" fill="rgba(231,76,60,0.15)" stroke="rgba(231,76,60,0.3)" stroke-width="1"/>
  <text x="600" y="351" font-family="system-ui, sans-serif" font-size="13" fill="#fd79a8" text-anchor="middle">Recharts</text>
  
  <!-- Divider line -->
  <rect x="80" y="390" width="500" height="1" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Features -->
  <text x="80" y="430" font-family="system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.4)">Kanban Boards  ·  AI Assistant  ·  Team Workspaces  ·  Dark Mode  ·  CI/CD</text>
  
  <!-- GitHub badge -->
  <rect x="80" y="520" width="240" height="44" rx="22" fill="url(#accent)"/>
  <text x="200" y="547" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">View on GitHub</text>
  
  <!-- Author -->
  <text x="80" y="590" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">github.com/Issei-Kun9/kanvus</text>
</svg>
